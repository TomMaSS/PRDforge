name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prdforge
          POSTGRES_PASSWORD: prdforge
          POSTGRES_DB: prdforge
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://prdforge:prdforge@localhost:5432/prdforge

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: pip install -r tests/requirements.txt

      - name: Install frontend dependencies
        run: |
          cd frontend
          corepack enable
          yarn install --immutable

      - name: Apply database migrations
        run: |
          for f in db/*.sql; do
            echo "Applying $f..."
            PGPASSWORD=prdforge psql -h localhost -U prdforge -d prdforge -f "$f"
          done

      - name: Run Python tests
        run: python -m pytest tests/test_mcp_tools.py tests/test_ui_api.py -v --tb=short

      - name: Run frontend checks
        run: |
          cd frontend
          yarn lint
          yarn typecheck
          yarn test --run

  e2e:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Boot full Docker Compose stack
        run: |
          docker compose up -d --build
          timeout 120 bash -c 'until curl -sf http://localhost:3000 > /dev/null 2>&1; do sleep 2; done'
          timeout 60 bash -c 'until curl -sf http://localhost:8088/health > /dev/null 2>&1; do sleep 2; done'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack and install deps
        run: corepack enable

      - name: Install frontend deps + Playwright
        working-directory: frontend
        run: |
          yarn install --immutable
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --reporter=html

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Teardown
        if: always()
        run: docker compose down -v
